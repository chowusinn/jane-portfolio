          <rect x="6.5" y="12.25" width="11" height="3.25" rx="0.75" fill="#fff" fillOpacity=".82" />

    }

    function EditorialSectionTitle({ children }) {
      return (
        <h2 className="mb-0 flex items-start gap-3 font-playfair text-xl font-semibold leading-snug tracking-tight text-[#111827] md:text-2xl">
          <span className="mt-1.5 inline-block h-9 w-[2px] shrink-0 bg-[#1e3a8a]" aria-hidden />
          <span className="min-w-0 flex-1">{children}</span>

    }

    function sideImgOnError(e) {
      const el = e.currentTarget;
      if (!el.dataset.fb) {
        el.dataset.fb = '1';
        el.src = pub('assets/hero-iris-placeholder.svg');
      }
    }

    function SidePosterPair({ posters, posterLabels, footnote }) {
      return (
        <div className="flex h-full w-full justify-end">

            <div className="side-poster-row">
              {posters.map((src, i) => (
                <figure key={src} className="m-0 flex h-full min-w-0 shrink-0 items-center justify-center">
                  <img src={src} alt={posterLabels[i]} onError={sideImgOnError} />
                </figure>
              ))}
            </div>
            <p className="mt-2 w-full min-w-0 self-stretch pl-0 text-left text-[9px] leading-tight text-[#9CA3AF] md:text-[10px]">
              {footnote}
            </p>
          </div>
        </div>

    }

    function SidePhotoWallA({ srcs, labels }) {
      return (
        <div className="mt-4 grid grid-cols-2 gap-3 md:h-[24rem] md:grid-cols-[0.92fr_1.16fr_0.92fr] md:grid-rows-2 md:gap-3">
          <figure className="m-0 md:row-span-2">
            <div className="aspect-[3/4] h-full w-full overflow-hidden md:aspect-auto">
              <img src={srcs[0]} alt={labels[0]} className="h-full w-full object-contain" onError={sideImgOnError} />
            </div>
          </figure>
          <figure className="m-0 md:col-start-2 md:row-start-1">
            <div className="aspect-[16/9] h-full w-full overflow-hidden md:aspect-auto">
              <img src={srcs[1]} alt={labels[1]} className="h-full w-full object-contain" onError={sideImgOnError} />
            </div>
          </figure>
          <figure className="m-0 md:col-start-2 md:row-start-2">
            <div className="aspect-[16/9] h-full w-full overflow-hidden md:aspect-auto">
              <img src={srcs[3]} alt={labels[3]} className="h-full w-full object-contain" onError={sideImgOnError} />
            </div>
          </figure>
          <figure className="m-0 md:col-start-3 md:row-span-2">
            <div className="aspect-[3/4] h-full w-full overflow-hidden md:aspect-auto">
              <img src={srcs[2]} alt={labels[2]} className="h-full w-full object-contain" onError={sideImgOnError} />
            </div>
          </figure>

    function SidePhotoWallB({ srcs, labels }) {
      return (
        <div className="mt-4 grid grid-cols-1 gap-3 md:h-[24rem] md:grid-cols-3 md:gap-3">
          {srcs.map((src, i) => (
            <figure key={src} className="m-0 h-full">
              <div className="h-full w-full overflow-hidden">
                <img src={src} alt={labels[i]} className="h-full w-full object-contain" onError={sideImgOnError} />
              </div>
            </figure>
          ))}
        </div>
      );
    }

    function SideActivityHeaderRow({ detail, posters, posterLabels, footnote }) {
      return (
        <div className="grid grid-cols-1 gap-8 lg:grid-cols-[minmax(0,1fr)_32rem] lg:items-start lg:gap-14">
          <div className="flex h-full min-w-0 items-start pr-2 lg:min-h-[336px] lg:pr-4">
            <p className="m-0 max-w-[24rem] text-base leading-[2.15] text-[#4B5563]">
              {detail}
            </p>
          </div>
          <div className="w-full min-w-0 justify-self-end">
            <SidePosterPair posters={posters} posterLabels={posterLabels} footnote={footnote} />
          </div>
        </div>
      );
    }

    function DetailSide({ t, lang, setLang, onBack }) {
      const s = t.side;
      const d = t.detail;
      const a = s.projectA;
      const b = s.projectB;
      const titleClass = 'font-playfair text-xl font-semibold leading-snug text-[#111827] md:text-2xl';

      return (
        <div className="min-h-screen bg-[#FDFCF8]">
          <header className="sticky top-0 z-40 border-b border-gray-100 bg-[#FDFCF8]/95 backdrop-blur-sm">
            <div className="mx-auto flex max-w-5xl items-center justify-between gap-4 px-6 py-3 md:px-8">
              <button
                type="button"
                onClick={onBack}
                className="shrink-0 border-0 bg-transparent p-0 text-[11px] font-medium uppercase tracking-[0.14em] text-[#4B5563] transition-colors hover:text-[#111827]"
              >
                ← {d.back}
              </button>
              <div className="shrink-0">
                <LangSwitch lang={lang} setLang={setLang} />
              </div>
            </div>
          </header>

          <main className="mx-auto max-w-5xl px-6 pb-24 pt-10 md:px-8">
            <section>
              <h2 className={titleClass}>{s.introTitle}</h2>
              <div className="editorial-wash mt-5 max-w-5xl px-1 py-1">
                <p className="m-0 text-sm leading-relaxed text-[#4B5563] md:text-[0.92rem]">{s.opening}</p>

            <section className="mt-14 md:mt-16">
              <h2 className={titleClass + ' inline-block bg-[#E6E6FA]/35 px-2 py-1'}>{a.title}</h2>
              <div className="mt-8">
                <SideActivityHeaderRow
                  detail={a.detail}
                  posters={[SIDE_A_MAIN_POSTER, SIDE_A_SUB_POSTER]}

            <div className="py-12" aria-hidden />

            <section>
              <h2 className={titleClass + ' inline-block bg-[#E6E6FA]/35 px-2 py-1'}>{b.title}</h2>
              <div className="mt-8">
                <SideActivityHeaderRow
                  detail={b.detail}
                  posters={[SIDE_B_HERO_POSTER, SIDE_B_SUB_POSTER]}
                  posterLabels={b.posterLabels}
                  footnote={s.footnotesB}
                />
                <SidePhotoWallB srcs={SIDE_B_PHOTOS} labels={b.photoLabels} />
              </div>
            </section>

            <p className="ml-auto mt-20 w-fit text-right text-[8px] leading-none text-gray-400 whitespace-nowrap md:mt-24 md:text-[9px]">{s.copyright}</p>
          </main>
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState('EN');
      const [view, setView] = useState('home');
      const t = T[lang];
      const SIDE_PATH = '/side-projects';

      const go = useCallback((id) => {
        document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, []);

      const onBack = useCallback(() => {
        try {
          window.history.pushState({}, '', '/');
        } catch (_) {}
        setView('home');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, []);

      const openSidePage = useCallback(() => {
        try {
          if (window.location.pathname !== SIDE_PATH) {
            window.history.pushState({}, '', SIDE_PATH);
          }
        } catch (_) {}
        setView('side');
        window.scrollTo(0, 0);
      }, []);

      useEffect(() => {
        if (view !== 'home') {
          window.scrollTo(0, 0);
        }
      }, [view]);

      useEffect(() => {
        const syncViewFromPath = () => {
          if (window.location.pathname === SIDE_PATH) {
            setView('side');
          } else {
            setView('home');
          }
        };
        window.scrollTo(0, 0);
        syncViewFromPath();
        window.addEventListener('popstate', syncViewFromPath);
        return () => window.removeEventListener('popstate', syncViewFromPath);
      }, []);

      if (view === 'bandai') return <DetailBandai t={t} lang={lang} setLang={setLang} onBack={onBack} />;
      if (view === 'sika') return <DetailSika t={t} lang={lang} setLang={setLang} onBack={onBack} />;
      if (view === 'side') return <DetailSide t={t} lang={lang} setLang={setLang} onBack={onBack} />;

      return (
        <div className="relative min-h-screen">
          <header className="fixed left-0 top-0 z-50 w-full border-b border-gray-100 bg-[#FDFCF8]/95 backdrop-blur-sm">
            <div className="mx-auto flex max-w-5xl items-center justify-between gap-4 px-6 py-2.5 md:px-8 md:py-3">
              <nav className="flex min-w-0 flex-1 flex-wrap items-center gap-x-4 gap-y-1.5 text-[11px] font-medium uppercase tracking-[0.14em] text-[#4B5563] md:gap-x-5 md:text-xs md:tracking-[0.16em]">
                <button
                  type="button"
                  onClick={() => go('glance')}
                  className="whitespace-nowrap border-0 bg-transparent p-0 hover:text-[#111827]"
                >
                  {t.nav.glance}
                </button>
                <button
                  type="button"
                  onClick={() => go('work')}
                  className="whitespace-nowrap border-0 bg-transparent p-0 hover:text-[#111827]"
                >
                  {t.nav.work}
                </button>
                <button
                  type="button"
                  onClick={() => go('side')}
                  className="whitespace-nowrap border-0 bg-transparent p-0 hover:text-[#111827]"
                >
                  {t.nav.side}
                </button>
                <button
                  type="button"
                  onClick={() => go('about')}
                  className="whitespace-nowrap border-0 bg-transparent p-0 hover:text-[#111827]"
                >
                  {t.nav.about}
                </button>
                <button
                  type="button"
                  onClick={() => go('contact')}
                  className="whitespace-nowrap border-0 bg-transparent p-0 hover:text-[#111827]"
                >
                  {t.nav.contact}
                </button>
              </nav>
              <div className="shrink-0">
                <LangSwitch lang={lang} setLang={setLang} />
              </div>
            </div>
          </header>

          <main className="mx-auto max-w-5xl px-6 md:px-8">
            <section id="hero" className="relative overflow-visible pb-10 pt-24 md:pt-28">
              <div className="relative z-10 min-h-[12rem] min-w-0 max-w-2xl">
                <div className="relative inline-block w-full max-w-xl">
                  <HeroTitleBlock lang={lang} t={t} irisHeroSrc={irisHeroSrc} />
                </div>
                <p className="mt-6 min-h-[3rem] text-base font-normal leading-relaxed text-[#4B5563] md:min-h-[3.25rem] md:text-lg">
                  {t.hero.line2}

                <div className="mt-9 flex min-h-[2.75rem] flex-wrap items-center gap-3 md:gap-3.5">
                  <a
                    href={RESUME_PDF_SRC}
                    target="_blank"
                    rel="noreferrer"
                    className="inline-flex items-center rounded-md border-2 border-gray-300 bg-transparent px-6 py-2.5 text-xs font-semibold tracking-wide text-[#111827] no-underline shadow-sm transition-colors duration-200 hover:border-gray-400 hover:bg-white/80 hover:text-[#111827] focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-200/80"
                  >
                    {t.hero.cta}
                  </a>
                </div>
              </div>
            </section>

            <div className="relative">
              <section id="glance" className="relative z-10 pb-11 pt-12 text-left">
                <SectionLabel>{t.glance.section}</SectionLabel>
                <div className="grid w-full max-w-4xl grid-cols-1 justify-items-start gap-x-5 gap-y-10 sm:grid-cols-3 sm:gap-x-6">

                    <GlanceStat num={t.glance.m1num} anno={t.glance.m1anno} />
                    <p className="mt-3 text-base font-medium leading-snug text-[#111827]">{t.glance.m1t}</p>
                    <p className="mt-2 text-sm leading-relaxed text-[#4B5563]">{t.glance.m1d}</p>
                  </div>
                  <div className="max-w-[14rem] sm:max-w-none">
                    <GlanceStat num={t.glance.m2num} anno={t.glance.m2anno} />
                    <p className="mt-3 text-base font-medium leading-snug text-[#111827]">{t.glance.m2t}</p>
                    <p className="mt-2 text-sm leading-relaxed text-[#4B5563]">{t.glance.m2d}</p>
                  </div>
                  <div className="max-w-[14rem] sm:max-w-none">
                    <GlanceStat num={t.glance.m3num} anno={t.glance.m3anno} />
                    <p className="mt-3 text-base font-medium leading-snug text-[#111827]">{t.glance.m3t}</p>
                    <p className="mt-2 text-sm leading-relaxed text-[#4B5563]">{t.glance.m3d}</p>
                  </div>
                </div>
              </section>

              <section id="work" className="relative z-10 pb-12 pt-2">
                <SectionLabel>{t.work.section}</SectionLabel>
                <div className="grid grid-cols-1 gap-10 md:grid-cols-2 md:gap-10 lg:gap-14">
                  <div
                    role="button"
                    tabIndex={0}
                    onClick={() => setView('bandai')}
                    onKeyDown={(e) => e.key === 'Enter' && setView('bandai')}
                    className="group flex cursor-pointer flex-col items-start text-left outline-none"
                  >
                    <div className="flex h-12 w-full items-center justify-start">
                      <img
                        src={bandaiLogoSrc}
                        alt=""
                        className="h-10 max-h-10 w-auto max-w-[200px] origin-left scale-[0.85] object-contain opacity-90 transition-opacity duration-300 group-hover:opacity-100"
                      />
                    </div>
                    <h3 className="mt-1.5 font-playfair text-xl font-normal leading-tight text-[#111827] md:text-2xl">
                      {t.work.bandai}
                    </h3>
                    <p className="mt-0.5 max-w-md text-[10px] font-medium uppercase leading-snug tracking-[0.1em] text-[#9CA3AF] md:whitespace-nowrap">
                      {t.work.bandaiSub}
                    </p>
                  </div>
                  <div
                    role="button"
                    tabIndex={0}
                    onClick={() => setView('sika')}
                    onKeyDown={(e) => e.key === 'Enter' && setView('sika')}

                    <div className="flex h-12 w-full items-center justify-start overflow-visible">

                        className="h-9 max-h-9 w-auto max-w-[220px] origin-left scale-[1.22] object-contain opacity-90 transition-opacity duration-300 group-hover:opacity-100"

                    </div>
                    <h3 className="mt-1.5 font-playfair text-xl font-normal leading-tight text-[#111827] md:text-2xl">

                    <p className="mt-0.5 max-w-md text-[10px] font-medium uppercase leading-snug tracking-[0.1em] text-[#9CA3AF] md:whitespace-nowrap">

                </div>
              </section>
            </div>

                <div className="mb-7 flex items-center text-sm font-medium uppercase tracking-[0.22em] text-[#4B5563]">
                  <SectionAccentRule />
                  <span>SIDE PROJECTS</span>
                </div>

                <div
                  role="button"
                  tabIndex={0}
                  onClick={openSidePage}
                  onKeyDown={(e) => (e.key === 'Enter' ? openSidePage() : null)}
                  className="flex cursor-pointer flex-col items-start gap-10 pt-2 md:flex-row md:items-start md:justify-between md:gap-12 lg:gap-14"
                >
                  <div className="w-full min-w-0 md:w-[52%] md:max-w-[55%] md:flex-none">
                    <h4 className="mb-3 font-playfair text-lg font-semibold leading-snug text-[#111827]">{t.side.coverTitle}</h4>
                    <p className="m-0 text-sm leading-relaxed text-[#4B5563] md:text-[0.9375rem] md:leading-relaxed">{t.side.coverBody}</p>
                    <div className="mt-5 flex flex-wrap items-center gap-3">
                      <a
                        href={t.side.xhsUrl}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="inline-flex max-w-full items-center gap-2.5 border-0 bg-transparent p-0 text-sm font-medium text-[#111827] no-underline"
                        onClick={(e) => e.stopPropagation()}
                      >
                        <IconXHS className="h-5 w-5" />
                        <span className="truncate">{t.side.xhsLabel}</span>
                      </a>
                      <span className="text-[10px] font-semibold uppercase tracking-[0.2em] text-[#9CA3AF] md:text-[11px]">
                        {t.side.explore}
                      </span>
                    </div>
                  </div>

                  <div className="relative ml-0 h-[15.5rem] w-full shrink-0 md:ml-0 md:h-[17.5rem] md:w-[min(48%,20rem)] md:flex-1 lg:h-[19rem] lg:max-w-[22rem]">
                    <figure className="absolute bottom-0 right-0 z-0 m-0 w-[72%] max-w-[14.5rem] overflow-hidden md:max-w-[15.5rem]">
                      <div className="flex aspect-[3/4] w-full items-center justify-center p-1.5 md:p-2">
                        <img
                          src={SIDE_COVER_POSTERS[0]}
                          alt="Side cover 1"
                          className="max-h-full max-w-full object-contain"
                          onError={sideImgOnError}

                      </div>
                    </figure>
                    <figure className="absolute left-0 top-2 z-10 m-0 w-[54%] max-w-[11rem] overflow-hidden md:top-4 md:max-w-[12rem]">
                      <div className="flex aspect-[3/4] w-full items-center justify-center p-1.5 md:p-2">
                        <img
                          src={SIDE_COVER_POSTERS[1]}
                          alt="Side cover 2"
                          className="max-h-full max-w-full object-contain"
                          onError={sideImgOnError}
                        />
                      </div>
                    </figure>
                  </div>
                </div>
              </div>
            </section>

            <section id="about" className="pb-11 pt-12 text-left">
              <div className="mb-6 flex items-center text-sm font-medium uppercase tracking-[0.22em] text-[#4B5563]">
                <SectionAccentRule />
                <span>{t.about.section}</span>
              </div>
              <div>
                <div className="grid max-w-4xl grid-cols-1 items-stretch gap-8 md:grid-cols-12 md:gap-10">
                  <div className="md:col-span-5">
                    <div className="grid h-full grid-cols-2 gap-1.5 md:h-[24rem] md:gap-1.5">
                      {ABOUT_PHOTOS.map((src, i) => (
                        <div key={src} className="aspect-[4/3] overflow-hidden rounded-lg">
                          <img
                            src={src}
                            alt={'About photo ' + (i + 1)}
                            className="h-full w-full object-cover"
                            onError={sideImgOnError}
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="md:col-span-7 md:flex md:h-[24rem] md:items-start md:pt-6">
                    <p className="max-w-xl text-sm leading-[2] tracking-[0.01em] text-[#4B5563]">
                      {t.about.body}
                    </p>
                  </div>
                </div>
              </div>
            </section>

            <section id="contact" className="pb-16 pt-12 text-left">
              <SectionLabel>{t.contact.section}</SectionLabel>
              <div className="flex flex-col items-start gap-5 sm:flex-row sm:gap-10">
                <a
                  href="mailto:chouwusinn@gmail.com"
                  className="group inline-flex items-center gap-2.5 text-[#4B5563] no-underline transition-colors hover:text-[#111827]"
                >
                  <span className="text-[#9CA3AF] transition-colors group-hover:text-[#111827]">
                    <IconEmail />
                  </span>
                  <span className="text-xs font-medium uppercase tracking-[0.16em]">{t.contact.email}</span>
                </a>
                <a
                  href="https://www.linkedin.com/in/%E8%87%BB-%E8%B5%B5-94071526b/"
                  target="_blank"
                  rel="noreferrer"
                  className="group inline-flex items-center gap-2.5 text-[#4B5563] no-underline transition-colors hover:text-[#111827]"
                >
                  <span className="text-[#9CA3AF] transition-colors group-hover:text-[#111827]">
                    <IconLinkedIn />
                  </span>
                  <span className="text-xs font-medium uppercase tracking-[0.16em]">{t.contact.linkedin}</span>
                </a>
              </div>
            </section>
            <p className="ml-auto mt-8 w-fit text-right text-[8px] leading-none text-gray-400 whitespace-nowrap md:text-[9px]">{t.detail.disclaimer}</p>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
